  <script type="module">
    let lastPath = "";
    function getPageNameFromPath(path) {
      const segments = path.split("/").filter(Boolean);
      return segments[0] || null;
    }
    function trackPageView() {
      const path = window.location.pathname;
      if (path === lastPath) return;
      lastPath = path;
      const pageName = getPageNameFromPath(path) || "home";
      const appId = "69a725c70c0608014c558df0";
      const serverUrl = "https://base44.app";
      if (!appId) return;
      fetch(`${serverUrl}/app-logs/${appId}/log-user-in-app/${pageName}`, {
        method: "POST"
      }).catch(() => {});
    }
    const originalPushState = history.pushState.bind(history);
    history.pushState = function (...args) {
      originalPushState(...args);
      trackPageView();
    };
    const originalReplaceState = history.replaceState.bind(history);
    history.replaceState = function (...args) {
      originalReplaceState(...args);
      trackPageView();
    };
    window.addEventListener("popstate", trackPageView);
    trackPageView();
  </script>

</head>
<body>
  <div id="root"></div>
  <script>
    (function () {
      var HOTMART_URL = "https://pay.hotmart.com/M104138061D?checkoutMode=2";
      var ASSET_BASE = (function () {
        var host = window.location.hostname || "";
        var p = window.location.pathname || "/";
        if (host.endsWith("github.io")) {
          return window.location.origin + "/fluxonf-landing/assets/";
        }
        if (p.indexOf("/fluxonf-landing") === 0) {
          return window.location.origin + "/fluxonf-landing/assets/";
        }
        return "assets/";
      })();

      function normalizeText(value) {
        return (value || "")
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/\s+/g, " ")
          .trim();
      }

      function findVideoSection() {
        var directTargets = [
          document.querySelector("#video"),
          document.querySelector("iframe"),
          document.querySelector("video"),
          document.querySelector("[class*='aspect-video']"),
          document.querySelector("[class*='aspect_video']")
        ];

        for (var d = 0; d < directTargets.length; d++) {
          if (directTargets[d]) {
            return directTargets[d].closest("section, main > div, div") || directTargets[d];
          }
        }

        var selectors = "h1,h2,h3,p,span,button,a,div";
        var nodes = document.querySelectorAll(selectors);
        for (var i = 0; i < nodes.length; i++) {
          var txt = normalizeText(nodes[i].textContent);
          if (
            txt.indexOf("apresentacao em video") >= 0 ||
            txt.indexOf("veja o fluxonf em acao") >= 0 ||
            txt.indexOf("demonstracao do fluxonf") >= 0 ||
            txt.indexOf("substitua este bloco pelo seu video") >= 0
          ) {
            return nodes[i].closest("section, main > div, div") || nodes[i];
          }
        }
        return null;
      }

      function isVideoButton(text) {
        return (
          text.indexOf("ver apresentacao") >= 0 ||
          text.indexOf("apresentacao em video") >= 0
        );
      }

      function isBuyButton(text) {
        return (
          text.indexOf("ativar assinatura") >= 0 ||
          text.indexOf("quero automatizar agora") >= 0 ||
          text.indexOf("comecar com r$ 49,90") >= 0 ||
          text.indexOf("comecar com r$49,90") >= 0 ||
          text.indexOf("r$ 49,90/mes") >= 0
        );
      }

      function injectFooterLogoStyles() {
        if (document.getElementById("fluxonf-footer-logo-style")) return;
        var style = document.createElement("style");
        style.id = "fluxonf-footer-logo-style";
        style.textContent = [
          ".fluxonf-footer-logo-wrap{display:inline-flex;align-items:center;}",
          ".fluxonf-footer-logo{display:block;height:52px;width:auto;object-fit:contain;}",
          "@media (max-width: 640px){.fluxonf-footer-logo{height:44px;}}"
        ].join("");
        document.head.appendChild(style);
      }

      function injectHideBase44BadgeStyles() {
        if (document.getElementById("hide-base44-badge-style")) return;
        var style = document.createElement("style");
        style.id = "hide-base44-badge-style";
        style.textContent = [
          "a[href*='base44.app'],",
          "a[href*='app.base44.com'],",
          "[data-base44-badge],",
          "[id*='base44'][class*='badge'],",
          "[class*='base44-badge'],",
          "[class*='Edit with Base44']{display:none !important;visibility:hidden !important;opacity:0 !important;pointer-events:none !important;}"
        ].join("");
        document.head.appendChild(style);
      }

      function removeBase44BadgeNodes() {
        var selectors = [
          "a[href*='base44.app']",
          "a[href*='app.base44.com']",
          "[data-base44-badge]",
          "[class*='base44-badge']",
          "[id*='base44']"
        ];
        var nodes = document.querySelectorAll(selectors.join(","));
        for (var i = 0; i < nodes.length; i++) {
          var nodeText = normalizeText(nodes[i].textContent || "");
          if (
            nodeText.indexOf("edit with base44") >= 0 ||
            nodeText.indexOf("base44") >= 0
          ) {
            nodes[i].remove();
          }
        }
      }

      function patchHotmartLogo() {
        var imgs = document.querySelectorAll("img");
        for (var i = 0; i < imgs.length; i++) {
          var img = imgs[i];
          var altText = normalizeText(img.getAttribute("alt") || "");
          var srcText = (img.getAttribute("src") || "").toLowerCase();
          var shouldReplace =
            altText.indexOf("hotmart") >= 0 ||
            srcText.indexOf("hotmart-1.svg") >= 0 ||
            srcText.indexOf("worldvectorlogo") >= 0;

          if (!shouldReplace) continue;

          if (img.getAttribute("data-hotmart-patched") === "1") continue;
          img.setAttribute("data-hotmart-patched", "1");
          img.setAttribute("src", ASSET_BASE + "hotmart.png");
          img.setAttribute("alt", "Hotmart");
          img.style.height = "22px";
          img.style.maxWidth = "92px";
          img.style.width = "auto";
          img.style.objectFit = "contain";
          img.style.verticalAlign = "middle";
          img.addEventListener("error", function () {
            this.style.display = "none";
          });
        }
      }

      function replaceFooterBrandWithLogo() {
        injectFooterLogoStyles();
        var footer = document.querySelector("footer");
        if (!footer) return false;

        var nodes = footer.querySelectorAll("*");
        for (var i = 0; i < nodes.length; i++) {
          var text = normalizeText(nodes[i].textContent);
          if (text !== "fluxonf") continue;

          var brandContainer = nodes[i].closest("a,div");
          if (!brandContainer) continue;
          if (brandContainer.querySelector(".fluxonf-footer-logo")) return true;

          brandContainer.innerHTML = "";
          brandContainer.classList.add("fluxonf-footer-logo-wrap");

          var logo = document.createElement("img");
          logo.className = "fluxonf-footer-logo";
          logo.alt = "FluxoNF";
          logo.src = encodeURI(ASSET_BASE + "logo 2 fluxonf.png");
          brandContainer.appendChild(logo);
          return true;
        }
        return false;
      }

      function openCheckout() {
        var isMobile = window.matchMedia("(max-width: 900px)").matches;
        if (isMobile) {
          var mobileTab = window.open(HOTMART_URL, "_blank");
          if (!mobileTab) {
            window.location.href = HOTMART_URL;
          }
          return;
        }

        var popupWidth = 560;
        var popupHeight = 820;

        var currentScreenX = typeof window.screenX === "number" ? window.screenX : window.screenLeft || 0;
        var currentScreenY = typeof window.screenY === "number" ? window.screenY : window.screenTop || 0;
        var currentOuterWidth = window.outerWidth || screen.availWidth || screen.width;
        var currentOuterHeight = window.outerHeight || screen.availHeight || screen.height;

        var left = Math.round(currentScreenX + (currentOuterWidth - popupWidth) / 2);
        var top = Math.round(currentScreenY + (currentOuterHeight - popupHeight) / 2);

        if (!isFinite(left)) left = Math.round((screen.availWidth - popupWidth) / 2);
        if (!isFinite(top)) top = Math.round((screen.availHeight - popupHeight) / 2);
        if (left < 0) left = 0;
        if (top < 0) top = 0;

        var features = [
          "toolbar=no",
          "location=yes",
          "status=no",
          "menubar=no",
          "scrollbars=yes",
          "resizable=yes",
          "width=" + popupWidth,
          "height=" + popupHeight,
          "top=" + Math.round(top),
          "left=" + Math.round(left)
        ].join(",");

        var checkoutWindow = window.open(HOTMART_URL, "fluxonf_hotmart_checkout", features);
        if (checkoutWindow && checkoutWindow.focus) {
          checkoutWindow.focus();
        } else {
          window.location.href = HOTMART_URL;
        }
      }

      document.addEventListener(
        "click",
        function (event) {
          var target = event.target.closest("button,a,[role='button']");
          if (!target) return;

          var text = normalizeText(target.textContent);
          if (!text) return;

          if (isVideoButton(text)) {
            var videoSection = findVideoSection();
            if (videoSection) {
              event.preventDefault();
              var top = videoSection.getBoundingClientRect().top + window.pageYOffset - 24;
              window.scrollTo({ top: top < 0 ? 0 : top, behavior: "smooth" });
            } else {
              setTimeout(function () {
                var delayedVideoSection = findVideoSection();
                if (delayedVideoSection) {
                  var delayedTop = delayedVideoSection.getBoundingClientRect().top + window.pageYOffset - 24;
                  window.scrollTo({ top: delayedTop < 0 ? 0 : delayedTop, behavior: "smooth" });
                }
              }, 220);
            }
            return;
          }

          if (isBuyButton(text)) {
            event.preventDefault();
            openCheckout();
          }
        },
        true
      );

      function setupFooterLogoObserver() {
        injectHideBase44BadgeStyles();
        removeBase44BadgeNodes();
        patchHotmartLogo();
        replaceFooterBrandWithLogo();
        var root = document.getElementById("root");
        if (!root) return;
        var observer = new MutationObserver(function () {
          removeBase44BadgeNodes();
          patchHotmartLogo();
          replaceFooterBrandWithLogo();
        });
        observer.observe(root, { childList: true, subtree: true });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", setupFooterLogoObserver);
      } else {
        setupFooterLogoObserver();
      }
    })();
  </script>
</body>
